        the nth term is $a_n = n(n+1)$.\\nTo find the 10th term, we set $n=10$:\\n\\n$a_{10}
        = 10 \\\\times (10 + 1)$\\n$a_{10} = 10 \\\\times 11$\\n$a_{10} = 110$\\n\\nSo,
        the **10th term is 110**.\\n\\n**2. Finding the Sum of the First 10 Terms
        ($S_{10}$)**\\n\\nTo find the sum of the first 10 terms, we need to sum $a_n
        = n(n+1)$ for $n=1$ to $10$.\\nThis is $S_N = \\\\sum_{n=1}^{N} n(n+1) = \\\\sum_{n=1}^{N}
        (n^2 + n)$.\\n\\nWe can use known summation formulas:\\n*   $\\\\sum_{n=1}^{N}
        n = \\\\frac{N(N+1)}{2}$\\n*   $\\\\sum_{n=1}^{N} n^2 = \\\\frac{N(N+1)(2N+1)}{6}$\\n\\nFor
        N=10:\\n\\n$S_{10} = \\\\sum_{n=1}^{10} n^2 + \\\\sum_{n=1}^{10} n$\\n\\n$S_{10}
        = \\\\frac{10(10+1)(2 \\\\times 10+1)}{6} + \\\\frac{10(10+1)}{2}$\\n$S_{10}
