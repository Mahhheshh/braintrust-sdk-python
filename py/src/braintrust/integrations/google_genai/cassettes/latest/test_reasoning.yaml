        c$, or $a_n = n^2 + bn + c$.\\n\\nLet's use the first few terms to find $b$
        and $c$:\\n\\n*   For $n=1$, $a_1 = 2$:\\n    $1^2 + b(1) + c = 2$\\n    $1
