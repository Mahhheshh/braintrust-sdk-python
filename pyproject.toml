[tool.ruff]
line-length = 119
force-exclude = true
extend-exclude = [
    "py/src/braintrust/_generated_types.py",
    "py/src/braintrust/generated_types.py",
]

[tool.ruff.lint]
select = [
    "I",    # isort
    "F401", # unused imports
]
[tool.ruff.lint.isort]
known-third-party = ["braintrust", "braintrust_local", "autoevals"]
lines-after-imports = 2
split-on-trailing-comma = true

[tool.pytest.ini_options]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
addopts = "--durations=3 --durations-min=0.1"
